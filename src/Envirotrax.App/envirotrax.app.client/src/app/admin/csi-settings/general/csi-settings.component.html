<div>
    <dp-loading-spinner *ngIf="isLoading" />

    <div dp-spinner-parent>
        <form #settingsForm="ngForm" (ngSubmit)="save(settingsForm)">

            <!-- CSI Settings Section -->
            <div class="mb-3">
                <vp-section header="CSI Settings">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Modification (Grace Period) Days:</label>
                                <select class="form-select"
                                        [(ngModel)]="settings.modificationGracePeriodDays"
                                        name="modificationGracePeriodDays">
                                    <option *ngFor="let opt of gracePeriodOptions" [ngValue]="opt.value">
                                        {{opt.label}}
                                    </option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Newly Created Backflow Test Expiration Days:</label>
                                <select class="form-select"
                                        [(ngModel)]="settings.newlyCreatedBackflowTestExpirationDays"
                                        name="newlyCreatedBackflowTestExpirationDays">
                                    <option *ngFor="let opt of expirationDaysOptions" [ngValue]="opt.value">
                                        {{opt.label}}
                                    </option>
                                </select>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       [(ngModel)]="settings.requireInspectionImages"
                                       name="requireInspectionImages" id="requireInspectionImages">
                                <label class="form-check-label" for="requireInspectionImages">Require Inspection Images</label>
                            </div>
                        </div>
                    </div>
                </vp-section>
            </div>

            <!-- CSI Letter Settings Section -->
            <div class="mb-3">
                <vp-section header="CSI Letter Settings">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Impending Notice 1:</label>
                                <select class="form-select"
                                        [(ngModel)]="settings.impendingNotice1"
                                        name="impendingNotice1">
                                    <option *ngFor="let opt of impendingNoticeOptions" [ngValue]="opt.value">
                                        {{opt.label}}
                                    </option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Impending Notice 2:</label>
                                <select class="form-select"
                                        [(ngModel)]="settings.impendingNotice2"
                                        name="impendingNotice2">
                                    <option *ngFor="let opt of impendingNoticeOptions" [ngValue]="opt.value">
                                        {{opt.label}}
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Past Due Notice 1:</label>
                                <select class="form-select"
                                        [(ngModel)]="settings.pastDueNotice1"
                                        name="pastDueNotice1">
                                    <option *ngFor="let opt of pastDueNoticeOptions" [ngValue]="opt.value">
                                        {{opt.label}}
                                    </option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Past Due Notice 2:</label>
                                <select class="form-select"
                                        [(ngModel)]="settings.pastDueNotice2"
                                        name="pastDueNotice2">
                                    <option *ngFor="let opt of pastDueNoticeOptions" [ngValue]="opt.value">
                                        {{opt.label}}
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Non-Compliant Days 1:</label>
                                <select class="form-select"
                                        [(ngModel)]="settings.nonCompliant1"
                                        name="nonCompliant1">
                                    <option *ngFor="let opt of nonCompliantOptions" [ngValue]="opt.value">
                                        {{opt.label}}
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Non-Compliant Days 2:</label>
                                <select class="form-select"
                                        [(ngModel)]="settings.nonCompliant2"
                                        name="nonCompliant2">
                                    <option *ngFor="let opt of nonCompliantOptions" [ngValue]="opt.value">
                                        {{opt.label}}
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>
                </vp-section>
            </div>

            <!-- CSI Letter Header Settings Section -->
            <div class="mb-3">
                <vp-section header="CSI Letter Header Settings">
                    <table class="table table-sm table-bordered">
                        <thead>
                            <tr>
                                <th></th>
                                <th class="text-center">Background Color</th>
                                <th class="text-center">Foreground Color</th>
                                <th class="text-center">Border Color</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="fw-semibold align-middle">Impending Letters</td>
                                <td class="text-center">
                                    <input type="color"
                                           class="form-control form-control-color mx-auto"
                                           [(ngModel)]="settings.impendingLettersBackgroundColor"
                                           name="impendingLettersBackgroundColor"
                                           title="Background Color">
                                </td>
                                <td class="text-center">
                                    <input type="color"
                                           class="form-control form-control-color mx-auto"
                                           [(ngModel)]="settings.impendingLettersForegroundColor"
                                           name="impendingLettersForegroundColor"
                                           title="Foreground Color">
                                </td>
                                <td class="text-center">
                                    <input type="color"
                                           class="form-control form-control-color mx-auto"
                                           [(ngModel)]="settings.impendingLettersBorderColor"
                                           name="impendingLettersBorderColor"
                                           title="Border Color">
                                </td>
                            </tr>
                            <tr>
                                <td class="fw-semibold align-middle">Past Due Letters</td>
                                <td class="text-center">
                                    <input type="color"
                                           class="form-control form-control-color mx-auto"
                                           [(ngModel)]="settings.pastDueLettersBackgroundColor"
                                           name="pastDueLettersBackgroundColor"
                                           title="Background Color">
                                </td>
                                <td class="text-center">
                                    <input type="color"
                                           class="form-control form-control-color mx-auto"
                                           [(ngModel)]="settings.pastDueLettersForegroundColor"
                                           name="pastDueLettersForegroundColor"
                                           title="Foreground Color">
                                </td>
                                <td class="text-center">
                                    <input type="color"
                                           class="form-control form-control-color mx-auto"
                                           [(ngModel)]="settings.pastDueLettersBorderColor"
                                           name="pastDueLettersBorderColor"
                                           title="Border Color">
                                </td>
                            </tr>
                            <tr>
                                <td class="fw-semibold align-middle">Non-Compliant Letters</td>
                                <td class="text-center">
                                    <input type="color"
                                           class="form-control form-control-color mx-auto"
                                           [(ngModel)]="settings.nonCompliantLettersBackgroundColor"
                                           name="nonCompliantLettersBackgroundColor"
                                           title="Background Color">
                                </td>
                                <td class="text-center">
                                    <input type="color"
                                           class="form-control form-control-color mx-auto"
                                           [(ngModel)]="settings.nonCompliantLettersForegroundColor"
                                           name="nonCompliantLettersForegroundColor"
                                           title="Foreground Color">
                                </td>
                                <td class="text-center">
                                    <input type="color"
                                           class="form-control form-control-color mx-auto"
                                           [(ngModel)]="settings.nonCompliantLettersBorderColor"
                                           name="nonCompliantLettersBorderColor"
                                           title="Border Color">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </vp-section>
            </div>

            <div class="mt-3">
                <vp-validation-summary [form]="settingsForm" [validationErrors]="validationErrors" />

                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary vp-section-button">
                        Save
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
