<div>
    <div class="text-center">
        <h1 class="h2 mb-3">
            System Settings
        </h1>
    </div>

    <div class="text-center mb-3">
        <ul class="vp-tabs nav nav-pills settings-tabs d-inline-flex">
            <li class="nav-item">
                <a class="nav-link" [routerLink]="['/admin/settings/general']">General Settings & Fees</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" [routerLink]="['/admin/settings/csi-settings']">CSI Settings</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" [routerLink]="['/admin/settings/backflow-testing-settings']">Backflow Testing Settings</a>
            </li>
        </ul>
    </div>

    <dp-loading-spinner *ngIf="isLoading" />

    <div dp-spinner-parent>
        <form #settingsForm="ngForm" (ngSubmit)="save(settingsForm)">
            <div class="row">
                <!-- Backflow Letter Settings Section -->
                <div class="col-md-12 mb-3">
                    <vp-section header="Backflow Letter Settings">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <vp-input type="select"
                                        label="Expiring notice 1"
                                        [(ngModel)]="settings.expiringNotice1"
                                        name="expiringNotice1"
                                        [options]="expiringNoticeOptions"
                                        />
                            </div>
                            <div class="col-md-6 mb-2">
                                <vp-input type="select"
                                        label="Expiring notice 2"
                                        [(ngModel)]="settings.expiringNotice2"
                                        name="expiringNotice2"
                                        [options]="expiringNoticeOptions"
                                        />
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6 mb-2">
                                <vp-input type="select"
                                        label="Expired notice 1"
                                        [(ngModel)]="settings.expiredNotice1"
                                        name="expiredNotice1"
                                        [options]="expiredNoticeOptions"
                                        />
                            </div>
                            <div class="col-md-6 mb-2">
                                <vp-input type="select"
                                        label="Expired notice 2"
                                        [(ngModel)]="settings.expiredNotice2"
                                        name="expiredNotice2"
                                        [options]="expiredNoticeOptions"
                                        />
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6 mb-2">
                                <vp-input type="select"
                                        label="Non-compliant days 1"
                                        [(ngModel)]="settings.backflowNonCompliant1"
                                        name="nonCompliantDays1"
                                        [options]="backflowNonCompliantOptions"
                                        />
                            </div>
                            <div class="col-md-6 mb-2">
                                <vp-input type="select"
                                        label="Non-compliant days 2"
                                        [(ngModel)]="settings.backflowNonCompliant2"
                                        
                                        name="nonCompliantDays2"
                                        [options]="backflowNonCompliantOptions"
                                        />
                            </div>
                        </div>
                    </vp-section>
                </div>

                <!-- Backflow Testing Settings Section -->
                <div class="col-md-6 mb-3">
                    <vp-section header="Backflow Testing Settings">
                        <div class="row mt-3">
                            <div class="col-md-6 mb-2">
                                <vp-input type="select"
                                        label="Testing method"
                                        [(ngModel)]="settings.testingMethod"
                                        name="testingMethod"
                                        [options]="testingMethodOptions"
                                        />
                            </div>
                            <div class="col-md-6 mb-2">
                                <vp-input type="number"
                                        label="Grace period days"
                                        [(ngModel)]="settings.gracePeriodDays"
                                        name="gracePeriodDays"
                                        />
                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-md-6 mt-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="settings.adjustBackflowCreepingDates"
                                        name="adjustBackflowCreepingDates" id="adjustBackflowCreepingDates">
                                    <label class="form-check-label" for="adjustBackflowCreepingDates">Adjust backflow creeping dates</label>
                                </div>
                            </div>
                            <div class="col-md-6 mt-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="settings.newInstallationsRequireApproval"
                                        name="newInstallationsRequireApproval" id="newInstallationsRequireApproval">
                                    <label class="form-check-label" for="newInstallationsRequireApproval">New installations require approval</label>
                                </div>
                            </div>
                            <div class="col-md-6 mt-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="settings.replacementsRequireApproval"
                                        name="replacementsRequireApproval" id="replacementsRequireApproval">
                                    <label class="form-check-label" for="replacementsRequireApproval">Replacements require approval</label>
                                </div>
                            </div>
                            <div class="col-md-6 mt-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="settings.detectorAssembliesRequireMeterReading"
                                        name="detectorAssembliesRequireMeterReading" id="detectorAssembliesRequireMeterReading">
                                    <label class="form-check-label" for="detectorAssembliesRequireMeterReading">Detector assemblies require meter reading</label>
                                </div>
                            </div>
                            <div class="col-md-6 mt-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="settings.outOfServiceRequiresApproval"
                                        name="outOfServiceRequiresApproval" id="outOfServiceRequiresApproval">
                                    <label class="form-check-label" for="outOfServiceRequiresApproval">Out of service requires approval</label>
                                </div>
                            </div>                          
                        </div>
                        
                        <div class="row mt-3">
                            <div class="col-md-6 mb-2">
                                <vp-input type="select"
                                        label="Out of service type"
                                        [(ngModel)]="settings.outOfServiceType"
                                        name="outOfServiceType"
                                        [options]="outOfServiceOptions"
                                        />
                            </div>
                            <div class="col-md-6 mt-auto mb-auto">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="settings.requireBackflowTestImages"
                                        name="requireBackflowTestImages" id="requireBackflowTestImages">
                                    <label class="form-check-label" for="requireBackflowTestImages">Require backflow test images</label>
                                </div>
                            </div>
                        </div>
                        
                    </vp-section>
                </div>

                <!-- Backflow Test Additional Information Section -->
                <div class="col-md-6 mb-3">
                    <vp-section header="Backflow Test Additional Information">
                        <div>
                            <div class="col-md-6 mt-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="settings.showWaterMeterNumber"
                                        name="showWaterMeterNumber" id="showWaterMeterNumber">
                                    <label class="form-check-label" for="showWaterMeterNumber"> Show water meter number</label>
                                </div>
                            </div>
                            <div class="col-md-6 mt-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="settings.showRainSensor"
                                        name="showRainSensor" id="showRainSensor">
                                    <label class="form-check-label" for="showRainSensor">Show rain sensor</label>
                                </div>
                            </div>
                            <div class="col-md-6 mt-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="settings.showOSSF"
                                        name="showOSSF" id="showOSSF">
                                    <label class="form-check-label" for="showOSSF">Show OSSF</label>
                                </div>
                            </div>
                            <div class="col-md-6 mt-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="settings.showPermitNumber"
                                        name="showPermitNumber" id="showPermitNumber">
                                    <label class="form-check-label" for="showPermitNumber">Show permit number</label>
                                </div>
                            </div>
                        </div>
                    </vp-section>
                </div>

                <!-- Backflow Letter Header Settings Section -->
                <div class="col-md-12 mb-3">
                    <vp-section header="Backflow Letter Header Settings">
                        <table class="table table-sm table-bordered">
                            <thead>
                                <tr>
                                    <th></th>
                                    <th class="text-center">Background color</th>
                                    <th class="text-center">Foreground color</th>
                                    <th class="text-center">Border color</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="fw-semibold align-middle">Expiring letters</td>
                                    <td class="text-center">
                                        <input type="color"
                                            class="form-control form-control-color mx-auto"
                                            [(ngModel)]="settings.expiringLettersBackgroundColor"
                                            name="expiringLettersBackgroundColor"
                                            title="Background Color">
                                    </td>
                                    <td class="text-center">
                                        <input type="color"
                                            class="form-control form-control-color mx-auto"
                                            [(ngModel)]="settings.expiringLettersForegroundColor"
                                            name="expiringLettersForegroundColor"
                                            title="Foreground Color">
                                    </td>
                                    <td class="text-center">
                                        <input type="color"
                                            class="form-control form-control-color mx-auto"
                                            [(ngModel)]="settings.expiringLettersBorderColor"
                                            name="expiringLettersBorderColor"
                                            title="Border Color">
                                    </td>
                                </tr>
                                <tr>
                                    <td class="fw-semibold align-middle">Expired letters</td>
                                    <td class="text-center">
                                        <input type="color"
                                            class="form-control form-control-color mx-auto"
                                            [(ngModel)]="settings.expiredLettersBackgroundColor"
                                            name="expiredLettersBackgroundColor"
                                            title="Background Color">
                                    </td>
                                    <td class="text-center">
                                        <input type="color"
                                            class="form-control form-control-color mx-auto"
                                            [(ngModel)]="settings.expiredLettersForegroundColor"
                                            name="expiredLettersForegroundColor"
                                            title="Foreground Color">
                                    </td>
                                    <td class="text-center">
                                        <input type="color"
                                            class="form-control form-control-color mx-auto"
                                            [(ngModel)]="settings.expiredLettersBorderColor"
                                            name="expiredLettersBorderColor"
                                            title="Border Color">
                                    </td>
                                </tr>
                                <tr>
                                    <td class="fw-semibold align-middle">Non-compliant letters</td>
                                    <td class="text-center">
                                        <input type="color"
                                            class="form-control form-control-color mx-auto"
                                            [(ngModel)]="settings.nonCompliantLettersBackgroundColor"
                                            name="nonCompliantLettersBackgroundColor"
                                            title="Background Color">
                                    </td>
                                    <td class="text-center">
                                        <input type="color"
                                            class="form-control form-control-color mx-auto"
                                            [(ngModel)]="settings.nonCompliantLettersForegroundColor"
                                            name="nonCompliantLettersForegroundColor"
                                            title="Foreground Color">
                                    </td>
                                    <td class="text-center">
                                        <input type="color"
                                            class="form-control form-control-color mx-auto"
                                            [(ngModel)]="settings.nonCompliantLettersBorderColor"
                                            name="nonCompliantLettersBorderColor"
                                            title="Border Color">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </vp-section>
                </div>

            </div>

            <div class="mt-3">
                <vp-validation-summary [form]="settingsForm" [validationErrors]="validationErrors" />

                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary vp-section-button">
                        Save
                    </button>
                </div>
            </div>
        </form>
    </div>


</div>
