<div>
    <div class="text-center">
        <h1 class="h2 mb-3">
            System Settings
        </h1>
    </div>

    <div class="text-center mb-3">
        <ul class="vp-tabs nav nav-pills settings-tabs d-inline-flex">
            <li class="nav-item">
                <a class="nav-link" [routerLink]="['/admin/settings/general']">General Settings & Fees</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" [routerLink]="['/admin/settings/csi-settings']">CSI Settings</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" [routerLink]="['/admin/settings/csi-letter-message-settings']">CSI Letter Message Setup</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" [routerLink]="['/admin/settings/backflow-testing-settings']">Backflow Testing Settings</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" [routerLink]="['/admin/settings/backflow-letter-message-settings']">Backflow Letter Message Setup</a>
            </li>
        </ul>
    </div>

    <dp-loading-spinner *ngIf="isLoading" />

    <div dp-spinner-parent>
        <form #settingsForm="ngForm" (ngSubmit)="save(settingsForm)">

            <!-- Letter General Settings -->
            <div class="mb-3">
                <vp-section header="Letter General Settings">
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <vp-input type="select"
                                      label="Font"
                                      [(ngModel)]="settings.noticeBodyFont"
                                      name="noticeBodyFont"
                                      [options]="fontOptions" />
                        </div>
                        <div class="col-md-3 mb-3">
                            <vp-input type="select"
                                      label="Font size (pt)"
                                      [(ngModel)]="settings.noticeBodyFontSize"
                                      name="noticeBodyFontSize"
                                      [options]="fontSizeOptions" />
                        </div>
                    </div>
                </vp-section>
            </div>

            <!-- Impending Letter Settings -->
            <div class="mb-3">
                <vp-section header="Impending Letter Settings">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <vp-input label="Title"
                                      [(ngModel)]="settings.impendingTitle"
                                      name="impendingTitle" />
                        </div>
                        <div class="col-md-12 mb-3">
                            <vp-input type="textarea"
                                      label="Message"
                                      [(ngModel)]="settings.impendingMessage"
                                      name="impendingMessage" />
                        </div>
                    </div>
                </vp-section>
            </div>

            <!-- Past Due Letter Settings -->
            <div class="mb-3">
                <vp-section header="Past Due Letter Settings">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <vp-input label="Title"
                                      [(ngModel)]="settings.pastDueTitle"
                                      name="pastDueTitle" />
                        </div>
                        <div class="col-md-12 mb-3">
                            <vp-input type="textarea"
                                      label="Message"
                                      [(ngModel)]="settings.pastDueMessage"
                                      name="pastDueMessage" />
                        </div>
                    </div>
                </vp-section>
            </div>

            <!-- Non-Compliant Letter Settings -->
            <div class="mb-3">
                <vp-section header="Non-Compliant Letter Settings">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <vp-input label="Title"
                                      [(ngModel)]="settings.nonCompliantTitle"
                                      name="nonCompliantTitle" />
                        </div>
                        <div class="col-md-12 mb-3">
                            <vp-input type="textarea"
                                      label="Message"
                                      [(ngModel)]="settings.nonCompliantMessage"
                                      name="nonCompliantMessage" />
                        </div>
                    </div>
                </vp-section>
            </div>

            <div class="mt-3">
                <vp-validation-summary [form]="settingsForm" [validationErrors]="validationErrors" />

                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary vp-section-button">
                        Save
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
