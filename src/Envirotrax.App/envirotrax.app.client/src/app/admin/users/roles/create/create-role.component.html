<div dp-spinner-parent>
    <dp-loading-spinner *ngIf="isLoading" />
    <form #form="ngForm" (ngSubmit)="save(form)">
        <div>
            <div class="mb-3">
                <vp-input [(ngModel)]="role.name"
                          [required]="true"
                          [maxLength]="100"
                          [form]="form"
                          name="name"
                          label="Name" />
            </div>

            <div class="mb-3">
                <vp-input [(ngModel)]="role.description"
                          [maxLength]="1000"
                          [form]="form"
                          name="description"
                          label="Description"
                          type="textarea" />
            </div>
        </div>

        <div class="mt-3">
            <vp-validation-summary [form]="form" [validationErrors]="validationErrors" />

            <div class="d-flex justify-content-center">
                <button type="button" class="btn btn-primary me-2 w-100" (click)="cancel()">
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary w-100">
                    Save
                </button>
            </div>
        </div>
    </form>
</div>
