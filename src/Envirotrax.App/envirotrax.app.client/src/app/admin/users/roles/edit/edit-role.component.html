<div>
    <div class="mb-3">
        <vp-section header="Role Information">
            <div dp-spinner-parent>
                <dp-loading-spinner *ngIf="isLoading" />

                <form #form="ngForm" (ngSubmit)="save(form)">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <vp-input [(ngModel)]="role.name"
                                          [required]="true"
                                          [maxLength]="100"
                                          [form]="form"
                                          name="name"
                                          label="Name"
                                          [maxLength]="100" />
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <vp-input [(ngModel)]="role.description"
                                  [maxLength]="1000"
                                  [form]="form"
                                  name="description"
                                  label="Description"
                                  type="textarea" />
                    </div>

                    <div class="mt-3">
                        <vp-validation-summary [form]="form" [validationErrors]="validationErrors" />

                        <div class="d-flex justify-content-end">
                            <button *ngIf="role.deletedTime"
                                    type="button"
                                    class="btn btn-danger vp-section-button me-2"
                                    (click)="reactivate()">
                                Undelete
                            </button>

                            <button type="submit" class="btn btn-primary vp-section-button">
                                Save
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </vp-section>
    </div>

    <div *ngIf="role && role.id">
        <vp-role-permission-list [roleId]="role.id" />
    </div>
</div>
