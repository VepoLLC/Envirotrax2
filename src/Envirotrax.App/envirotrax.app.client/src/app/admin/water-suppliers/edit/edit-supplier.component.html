<dp-loading-spinner *ngIf="isLoading" />

<div class="d-flex justify-content-center align-items-center mb-3">
    <h2>Edit Water Supplier Account Information</h2>
</div>

<div>
    <div>
        <form #supplierForm="ngForm" (ngSubmit)="save(supplierForm)">

            <!-- Main account information -->
            <vp-section header="Main account information" class="mb-3">
                <div class="row">
                    <div class="col-md-6">

                        <div class="mb-3">
                            <vp-input [(ngModel)]="supplier.name"
                                      name="name"
                                      label="Water supplier name"
                                      [required]="true"
                                      [maxLength]="255"
                                      [form]="supplierForm" />
                        </div>

                        <div class="mb-3">
                            <vp-input [(ngModel)]="supplier.contactName"
                                      name="contactName"
                                      label="Contact name"
                                      [required]="true"
                                      [maxLength]="100"
                                      [form]="supplierForm" />
                        </div>

                        <div class="mb-3">
                            <vp-input [(ngModel)]="supplier.address"
                                      name="address"
                                      label="Address"
                                      [maxLength]="100"
                                      [form]="supplierForm" />
                        </div>

                        <div class="mb-3">
                            <vp-input [(ngModel)]="supplier.city"
                                      name="city"
                                      label="City"
                                      [maxLength]="50"
                                      [form]="supplierForm" />
                        </div>

                        <div class="mb-3">
                            <vp-input [ngModel]="supplier.state?.id"
                                      (ngModelChange)="supplier.state = $event ? { id: $event } : undefined"
                                      [options]="states"
                                      [form]="supplierForm"
                                      type="select"
                                      name="stateId"
                                      label="State" />
                        </div>

                        <div class="mb-3">
                            <vp-input [(ngModel)]="supplier.zipCode"
                                      name="zipCode"
                                      label="Zip code"
                                      [maxLength]="50"
                                      [form]="supplierForm" />
                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="mb-3">
                            <vp-input [(ngModel)]="supplier.domain"
                                      [required]="true"
                                      name="domain"
                                      label="Domain"
                                      [maxLength]="50"
                                      [form]="supplierForm" />
                        </div>

                        <div class="mb-3">
                            <vp-input [(ngModel)]="supplier.pwsId"
                                      name="pwsId"
                                      label="PWS ID"
                                      [maxLength]="25"
                                      [form]="supplierForm" />
                        </div>

                        <div class="mb-3">
                            <vp-input [(ngModel)]="supplier.phoneNumber"
                                      name="phoneNumber"
                                      label="Phone number"
                                      [maxLength]="25"
                                      [form]="supplierForm" />
                        </div>

                        <div class="mb-3">
                            <vp-input [(ngModel)]="supplier.faxNumber"
                                      name="faxNumber"
                                      label="Fax number"
                                      [maxLength]="25"
                                      [form]="supplierForm" />
                        </div>

                        <div class="mb-3">
                            <vp-input [(ngModel)]="supplier.emailAddress"
                                      name="emailAddress"
                                      label="Email address"
                                      type="email"
                                      [maxLength]="100"
                                      [form]="supplierForm" />
                        </div>

                    </div>
                </div>
            </vp-section>

            <div class="row mt-3 mb-3">
                <div class="col-md-6">
                    <!-- Letter Return Address -->
                    <vp-section header="Letter Return Address Information">
                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterCompanyName"
                                          name="lrCompanyName"
                                          label="Company name"
                                          [maxLength]="255"
                                          [form]="supplierForm" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterContactName"
                                          name="lrContactName"
                                          label="Contact name"
                                          [maxLength]="100"
                                          [form]="supplierForm" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterAddress"
                                          name="lrAddress"
                                          label="Address"
                                          [maxLength]="100"
                                          [form]="supplierForm" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterCity"
                                          name="lrCity"
                                          label="City"
                                          [maxLength]="50"
                                          [form]="supplierForm" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [ngModel]="supplier.letterState?.id"
                                          (ngModelChange)="supplier.letterState = $event ? { id: $event } : undefined"
                                          [options]="states"
                                          [form]="supplierForm"
                                          type="select"
                                          name="letterStateId"
                                          label="State" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterZipCode"
                                          name="lrZipCode"
                                          label="Zip code"
                                          [maxLength]="50"
                                          [form]="supplierForm" />
                            </div>

                        </div>
                    </vp-section>
                </div>

                <div class="col-md-6">
                    <!-- Letter Contact Information -->
                    <vp-section header="Letter Contact Information">
                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterContactCompanyName"
                                          name="lcCompanyName"
                                          label="Company name"
                                          [maxLength]="100"
                                          [form]="supplierForm" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterContactContactName"
                                          name="lcContactName"
                                          label="Contact name"
                                          [maxLength]="100"
                                          [form]="supplierForm" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterContactAddress"
                                          name="lcAddress"
                                          label="Address"
                                          [maxLength]="100"
                                          [form]="supplierForm" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterContactCity"
                                          name="lcCity"
                                          label="City"
                                          [maxLength]="50"
                                          [form]="supplierForm" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [ngModel]="supplier.letterContactState?.id"
                                          (ngModelChange)="supplier.letterContactState = $event ? { id: $event } : undefined"
                                          [options]="states"
                                          [form]="supplierForm"
                                          type="select"
                                          name="letterContactStateId"
                                          label="State" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterContactZipCode"
                                          name="lcZipCode"
                                          label="Zip code"
                                          [maxLength]="50"
                                          [form]="supplierForm" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterContactPhoneNumber"
                                          name="lcPhone"
                                          label="Phone number"
                                          [maxLength]="25"
                                          [form]="supplierForm" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterContactFaxNumber"
                                          name="lcFax"
                                          label="Fax number"
                                          [maxLength]="25"
                                          [form]="supplierForm" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <vp-input [(ngModel)]="supplier.letterContactEmailAddress"
                                          name="lcEmail"
                                          label="Email address"
                                          type="email"
                                          [maxLength]="100"
                                          [form]="supplierForm" />
                            </div>

                        </div>
                    </vp-section>
                </div>
            </div>

            <div class="mt-3">
                <vp-validation-summary [form]="supplierForm"
                                       [validationErrors]="validationErrors" />

                <div class="d-flex justify-content-center">
                    <button type="submit"
                            class="btn btn-primary vp-section-button">
                        Save
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
