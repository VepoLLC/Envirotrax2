<div dp-spinner-parent>
    <dp-loading-spinner *ngIf="isLoading" />
    <form #form="ngForm" (ngSubmit)="save(form)">
        <div class="">
            <div class="mb-3 w-100">
                <vp-input [(ngModel)]="user.contactName"
                              [required]="true"
                              name="contactName"
                              label="Contact name"
                              [maxLength]="255"
                              [form]="form" />
            </div>

            <ng-container *ngIf="!isEditMode">          
                <div class="mb-3 w-100">
                    <vp-input [(ngModel)]="user.emailAddress"
                                  [required]="true"
                                  [type]="'email'"
                                  name="emailAddress"
                                  label="Email"
                                  [maxLength]="100"
                                  [form]="form" />
                </div>
                <div class="mb-3 w-100">
                    <vp-input [(ngModel)]="user.jobTitle"
                                  name="jobTitle"
                                  label="Job title"
                                  [maxLength]="150"
                                  [form]="form" />
                </div>      
            </ng-container>
        </div>

        <div class="mt-3">
            <vp-validation-summary [form]="form" [validationErrors]="validationErrors" />

            <div class="d-flex justify-content-center">
                <button type="button" class="btn btn-primary me-2 w-100" (click)="cancel()">
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary w-100">
                    Save
                </button>
            </div>
        </div>
    </form>
</div>
