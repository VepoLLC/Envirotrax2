
<vp-section header="Licensed Personnel Sub Accounts">
    <div dp-spinner-parent>
        <dp-loading-spinner *ngIf="table.isLoading"></dp-loading-spinner>

        <vp-table *ngIf="table.items"
                  [columns]="table.columns!"
                  [data]="table.items.data"
                  [(pageInfo)]="table.items.pageInfo"
                  (pageInfoChange)="loadSubAccounts()"
                  [(query)]="table.query"
                  (queryChange)="loadSubAccounts()"
                  (queryReset)="loadSubAccounts()"
                  [showActionLabels]="false"
                  [canAdd]="canManage"
                  (add)="addUser()"
                  [canEdit]="canManage"
                  (edit)="editUser($event)"
                  [canDelete]="canManage"
                  (delete)="deleteUser($event)" />
    </div>
</vp-section>
