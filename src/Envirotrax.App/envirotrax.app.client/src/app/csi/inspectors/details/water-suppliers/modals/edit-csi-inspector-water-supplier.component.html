<div dp-spinner-parent>
    <dp-loading-spinner *ngIf="isLoading" />

    <form #form="ngForm" (ngSubmit)="save(form)">
        <div class="mb-3">
            <strong>Water Supplier:</strong> <span class="ms-2">{{supplier.waterSupplier?.name }}</span>
        </div>

        <div class="mb-3">
            <vp-input type="number"
                      name="csiCommercialInspectionFee"
                      label="Commercial Fee"
                      [(ngModel)]="supplier.csiCommercialInspectionFee"
                      [form]="form" />
        </div>

        <div class="mb-3">
            <vp-input type="number"
                      name="csiResidentialInspectionFee"
                      label="Residential Fee"
                      [(ngModel)]="supplier.csiResidentialInspectionFee"
                      [form]="form" />
        </div>

        <div class="mb-3">
            <small class="text-muted">
                <strong>Fee Value of -1:</strong> Use Water Supplier fee.<br />
                <strong>Fee Value of 0:</strong> Free submission.<br />
                <strong>Fee Value of &gt;0:</strong> Overrides the Water Supplier fee and uses this fee.
            </small>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox"
                   class="form-check-input"
                   id="isActive"
                   name="isActive"
                   [(ngModel)]="isActive" />
            <label class="form-check-label" for="isActive">Active</label>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox"
                   class="form-check-input"
                   id="isBanned"
                   name="isBanned"
                   [(ngModel)]="supplier.isBanned" />
            <label class="form-check-label" for="isBanned">Suspended</label>
        </div>

        <div class="mt-3">
            <vp-validation-summary [form]="form" [validationErrors]="validationErrors" />

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-primary w-100" (click)="cancel()">Cancel</button>
                <button type="submit" class="btn btn-primary w-100">Save</button>
            </div>
        </div>
    </form>
</div>
