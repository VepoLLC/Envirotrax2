<div dp-spinner-parent>
    <dp-loading-spinner *ngIf="isLoading" />

    <form #form="ngForm" (ngSubmit)="save(form)">
        <div class="mb-3">
            <vp-input name="manufacturer"
                      label="Manufacturer"
                      [(ngModel)]="gauge.manufacturer"
                      [required]="true"
                      [maxLength]="100"
                      [form]="form" />
        </div>

        <div class="mb-3">
            <vp-input name="model"
                      label="Model"
                      [(ngModel)]="gauge.model"
                      [required]="true"
                      [maxLength]="100"
                      [form]="form" />
        </div>

        <div class="mb-3">
            <vp-input name="serialNumber"
                      label="Serial number"
                      [(ngModel)]="gauge.serialNumber"
                      [required]="true"
                      [maxLength]="50"
                      [form]="form" />
        </div>

        <div class="mb-3">
            <vp-input type="date"
                      name="lastCalibrationDate"
                      label="Last calibration date"
                      [(ngModel)]="gauge.lastCalibrationDate"
                      [required]="true"
                      [form]="form" />
        </div>

        <div class="form-check mb-3">
            <input id="is-portable-edit"
                   type="checkbox"
                   class="form-check-input"
                   [(ngModel)]="gauge.isPortable"
                   name="isPortable">
            <label for="is-portable-edit" class="form-check-label">
                Portable gauge
            </label>
        </div>

        <div class="mt-3">
            <vp-validation-summary [form]="form" [validationErrors]="validationErrors" />

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-primary vp-section-button w-100" (click)="cancel()">
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary vp-section-button w-100">
                    Save
                </button>
            </div>
        </div>
    </form>
</div>
