<h1 class="text-center h2">Backflow Test Search</h1>

<div [hidden]="showResults">
    <form #searchForm="ngForm" (ngSubmit)="search(searchForm)">
        <vp-filter-panel (filterChange)="onFilterChange($event)">

            <!-- General Search Criteria -->
            <vp-section header="Search criteria">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <vp-filter-panel-field fieldName="recordScope"
                                                   label="Record search scope"
                                                   type="select"
                                                   [options]="recordScopeOptions"
                                                   [form]="searchForm" />
                        </div>
                        <div class="mb-3">
                            <vp-filter-panel-field fieldName="isCurrent"
                                                   label="Test history"
                                                   type="select"
                                                   [options]="testHistoryOptions"
                                                   [form]="searchForm" />
                        </div>
                        <div class="mb-3">
                            <vp-filter-panel-field fieldName="accountNumber"
                                                   label="Account number"
                                                   [form]="searchForm" />
                        </div>
                        <div class="mb-3">
                            <vp-filter-panel-field fieldName="serialNumber"
                                                   label="Assembly serial number"
                                                   [form]="searchForm" />
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <vp-filter-panel-field fieldName="jobNumber"
                                                   label="Job number"
                                                   [form]="searchForm" />
                        </div>
                        <div class="mb-3">
                            <vp-filter-panel-field fieldName="dateType"
                                                   label="Date type"
                                                   type="select"
                                                   [options]="dateTypeOptions"
                                                   [form]="searchForm" />
                        </div>
                    </div>
                </div>
            </vp-section>

            <!-- Location / Property + Contact / Mailing side by side -->
            <div class="row mt-3">
                <div class="col-md-6">
                    <vp-section header="Location / property criteria">
                        <div class="row">
                            <div class="col-12 mb-3">
                                <vp-filter-panel-field fieldName="propertyType"
                                                       label="Property type"
                                                       type="select"
                                                       [options]="propertyTypeOptions"
                                                       [form]="searchForm" />
                            </div>
                            <div class="col-12 mb-3">
                                <vp-filter-panel-field fieldName="propertyBusinessName"
                                                       label="Business name"
                                                       [form]="searchForm" />
                            </div>
                            <div class="col-4 mb-3">
                                <vp-filter-panel-field fieldName="propertyStreetNumber"
                                                       label="Street #"
                                                       [form]="searchForm" />
                            </div>
                            <div class="col-5 mb-3">
                                <vp-filter-panel-field fieldName="propertyStreetName"
                                                       label="Street name"
                                                       [form]="searchForm" />
                            </div>
                            <div class="col-3 mb-3">
                                <vp-filter-panel-field fieldName="propertyNumber"
                                                       label="Suite/Apt #"
                                                       [form]="searchForm" />
                            </div>
                        </div>
                    </vp-section>
                </div>

                <div class="col-md-6 mt-3 mt-md-0">
                    <vp-section header="Contact / mailing criteria">
                        <div class="row">
                            <div class="col-12 mb-3">
                                <vp-filter-panel-field fieldName="mailingCompanyName"
                                                       label="Company name"
                                                       [form]="searchForm" />
                            </div>
                            <div class="col-12 mb-3">
                                <vp-filter-panel-field fieldName="mailingContactName"
                                                       label="Contact name"
                                                       [form]="searchForm" />
                            </div>
                            <div class="col-4 mb-3">
                                <vp-filter-panel-field fieldName="mailingStreetNumber"
                                                       label="Street #"
                                                       [form]="searchForm" />
                            </div>
                            <div class="col-5 mb-3">
                                <vp-filter-panel-field fieldName="mailingStreetName"
                                                       label="Street name"
                                                       [form]="searchForm" />
                            </div>
                            <div class="col-3 mb-3">
                                <vp-filter-panel-field fieldName="mailingNumber"
                                                       label="Suite/Apt #"
                                                       [form]="searchForm" />
                            </div>
                        </div>
                    </vp-section>
                </div>
            </div>

        </vp-filter-panel>

        <div class="mt-3">
            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-primary vp-section-button">
                    <i class="fa-solid fa-magnifying-glass me-1"></i>
                    Search
                </button>
            </div>
        </div>
    </form>
</div>

<dp-loading-spinner *ngIf="table.isLoading"></dp-loading-spinner>

<div *ngIf="showResults">
    <div class="d-flex justify-content-end mb-3">
        <button type="button"
                class="btn btn-primary vp-section-button"
                (click)="showResults = false;">
            Search Again
        </button>
    </div>

    <vp-section header="Backflow test search results">
        <vp-table *ngIf="table.items"
                  [columns]="table.columns!"
                  [data]="table.items.data"
                  [(pageInfo)]="table.items.pageInfo"
                  (pageInfoChange)="getTests()"
                  [(query)]="table.query"
                  (queryChange)="getTests()"
                  (queryReset)="getTests()"
                  [freeTextSearch]="table.freeTextSearch" />
    </vp-section>
</div>
