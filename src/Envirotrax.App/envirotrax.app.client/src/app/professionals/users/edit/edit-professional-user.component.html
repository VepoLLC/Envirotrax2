<div>
    <vp-section header="Main Information">
        <dp-loading-spinner *ngIf="isLoading" />

        <div dp-spinner-parent>
            <form #userForm="ngForm" (ngSubmit)="save(userForm)">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <vp-input [(ngModel)]="user.contactName"
                                      [required]="true"
                                      [maxLength]="255"
                                      name="contactName"
                                      label="Contact name"
                                      [form]="userForm" />
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-3">
                            <vp-input [(ngModel)]="user.emailAddress"
                                      [required]="true"
                                      [maxLength]="100"
                                      name="emailAddress"
                                      label="Email address"
                                      [form]="userForm" />
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-3">
                            <vp-input [(ngModel)]="user.jobTitle"
                                      [maxLength]="150"
                                      name="jobTitle"
                                      label="Job title"
                                      [form]="userForm" />
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-3">
                            <vp-input type="multi-select"
                                      [(ngModel)]="selectedJobFunctions"
                                      name="jobFunctions"
                                      label="Job functions"
                                      [options]="jobFunctionOptions" />
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input"
                                       [(ngModel)]="user.isAdmin" name="isAdmin">
                                <label class="form-check-label">
                                    Is this user and Administrator?
                                    <vp-info-icon
                                                  text="Administrators can manage sub accounts, licenses, insurances, etc." />
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-3">
                    <vp-validation-summary [form]="userForm" [validationErrors]="validationErrors" />

                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-secondary vp-section-button" (click)="resendInvitation()">
                            Resend Invitation
                        </button>
                        <button type="submit" class="btn btn-primary vp-section-button">
                            Save
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </vp-section>
</div>

<div *ngIf="user.id" class="mt-3">
    <vp-professional-user-license-list [userId]="user.id" />
</div>
