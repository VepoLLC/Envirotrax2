<div class="vp-input-container flex-column"
     [class.d-flex]="flexFill"
     [class.flex-fill]="flexFill">
    <div class="d-flex justify-content-between">
        <label *ngIf="label" [attr.for]="id" class="form-label">
            {{label}}
            <span *ngIf="required" class="text-danger">*</span>
        </label>
        <div *ngIf="(type == 'text' || type == 'textarea') && maxLength" class="lh-sm me-1 text-end text-muted">
            <small>{{value?.length || 0}} of {{maxLength}}</small>
        </div>
    </div>

    <input *ngIf="type != 'textarea' && type != 'select' && type != 'multi-select' && type != 'date' && type != 'datetime' && type != 'daterange'"
           [attr.id]="id"
           [attr.name]="name"
           [attr.type]="decimals != null ? 'text' : type"
           [attr.inputmode]="decimals != null ? 'decimal' : null"
           class="form-control"
           [required]="required"
           [readonly]="readonly"
           [disabled]="disabled"
           [attr.maxlength]="maxLength"
           [attr.min]="min"
           [attr.max]="max"
           [attr.step]="step"
           [(ngModel)]="value"
           (change)="onChanged()"
           (blur)="onTouched($event)"
           [placeholder]="placeholder"
           (input)="onInput($event)" />

    <textarea *ngIf="type == 'textarea'"
              [attr.id]="id"
              [attr.name]="name"
              [attr.type]="type"
              class="form-control flex-fill"
              [required]="required"
              [readonly]="readonly"
              [disabled]="disabled"
              [attr.maxlength]="maxLength"
              [rows]="rows"
              [placeholder]="placeholder"
              [(ngModel)]="value"
              (change)="onChanged()"
              (blur)="onTouched($event)"
              (input)="onInput($event)">
    </textarea>
    <input *ngIf="type == 'date'"
           type="date" [attr.id]="id"
           [attr.name]="name"
           class="form-control"
           [required]="required"
           [readonly]="readonly"
           [disabled]="disabled"
           [attr.min]="min"
           [attr.max]="max"
           [ngModel]="value | date:'yyyy-MM-dd'"
           [placeholder]="placeholder"
           (ngModelChange)="value = $event"
           (change)="onChanged()"
           (blur)="onTouched($event)" />
    <input *ngIf="type == 'datetime' || type == 'daterange'"
           #flatpickr
           [attr.id]="id"
           [attr.name]="name"
           class="form-control"
           [required]="required"
           [readonly]="readonly"
           [disabled]="disabled"
           [attr.min]="min"
           [attr.max]="max"
           [placeholder]="placeholder"
           (blur)="onTouched($event)" />
    <ng-select *ngIf="type == 'select' || type == 'multi-select'"
               [attr.id]="id"
               [attr.name]="name"
               class="form-control"
               [class.has-custom-border]="!!borderColor"
               [style.--vp-select-border-color]="borderColor"
               [required]="required"
               [disabled]="disabled || readonly"
               [(ngModel)]="value"
               [items]="options"
               [multiple]="type == 'multi-select'"
               (change)="onChanged()"
               (blur)="onTouched($event)"
               [attr.value]="value"
               bindLabel="text"
               bindValue="id"
               [placeholder]="placeholder"
               [clearable]="false"
               [searchable]="false"
               appendTo="body">
    </ng-select>

    <div>
        <vp-validation-field *ngIf="form" [form]="form" [fieldName]="name" [fieldLabel]="label" />
    </div>
</div>
