<h1 class="text-center h2">
    Property Record Search
</h1>

<div [hidden]="showResults">

    <div class="d-flex justify-content-center  mb-3">
        <button type="button"
                class="btn btn-primary"
                title="Create New Property Record"
                aria-label="Create New Property Record"
                (click)="add()">
            <i class="fa-solid fa-circle-plus me-1"></i>
            Create New Property Record
        </button>
    </div>

    <form #searchForm="ngForm" (ngSubmit)="search(searchForm)">
        <vp-filter-panel (filterChange)="onFilterChange($event)">
            <vp-section header="General Search Criteria">
                <div class="row">
                    <div class="col-md-6">
                        <vp-filter-panel-field fieldName="accountNumber"
                                               label="Account Number"
                                               [form]="searchForm" />
                    </div>

                    <div class="col-md-6">
                        <vp-filter-panel-field fieldName="facilityType"
                                               label="Facility Type"
                                               type="select"
                                               [form]="searchForm"
                                               [options]="facilityTypes" />
                    </div>

                    <div class="col-md-6">
                        <vp-filter-panel-field fieldName="createdTime"
                                               label="Creation Date"
                                               type="daterange"
                                               [form]="searchForm" />
                    </div>
                </div>
            </vp-section>
        </vp-filter-panel>

        <div class="mt-3">
            <vp-validation-summary [form]="searchForm" />

            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-primary vp-section-button">
                    Search
                </button>
            </div>
        </div>
    </form>
</div>

<dp-loading-spinner *ngIf="table.isLoading"></dp-loading-spinner>



<div *ngIf="showResults">

    <div class="d-flex justify-content-between mb-3">

        <button type="button"
                class="btn btn-primary"
                title="Create New Property Record"
                aria-label="Create New Property Record"
                (click)="add()">
            <i class="fa-solid fa-circle-plus me-1"></i>
            Create New Property Record
        </button>

        <button type="button"
                class="btn btn-primary vp-section-button"
                (click)="showResults = false;">
            Search Again
        </button>

    </div>


    <!--<button type="button" class="btn btn-primary" title="Create New Property Record"
            aria-label="Create New Property Record" (click)="add()">
        <i class="fa-solid fa-circle-plus"></i>
        Create New Property Record
    </button>

    <div class="mb-3 d-flex justify-content-end">
        <button type="button" class="btn btn-primary vp-section-button" (click)="showResults = false;">
            Search Again
        </button>
    </div>-->

    <vp-section header="Property Record Search">
        <vp-table *ngIf="table.items"
                  [columns]="table.columns!"
                  [data]="table.items.data"
                  [(pageInfo)]="table.items.pageInfo"
                  (pageInfoChange)="getSites()"
                  [(query)]="table.query"
                  (queryChange)="getSites()"
                  (queryReset)="getSites()"
                  [canEdit]="true"
                  (edit)="edit($event)"
                  [freeTextSearch]="table.freeTextSearch" />
    </vp-section>
</div>
